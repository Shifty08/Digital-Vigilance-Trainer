{% extends 'trainer/base.html' %}

{% block content %}
<style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .auth-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
    .auth-card h2 { text-align: center; margin-bottom: 25px; font-weight: 800; }
    .form-group { margin-bottom: 20px; position: relative; }
    label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; color: #64748b; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; box-sizing: border-box; transition: 0.3s; font-size: 1rem; outline: none; }
    input:focus { border-color: #6366f1; background: #fff; }

    
    .error-box { display: none; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 12px; padding: 12px; margin-top: 10px; align-items: center; gap: 10px; }
    .error-box.active { display: flex !important; }
    input.invalid-user { border-color: #ef4444 !important; background-color: #fffafb; }
    .error-box span { color: #ef4444; font-size: 0.85rem; font-weight: 600; }

    
    .req-list { list-style: none; padding: 0; margin: 15px 0; font-size: 0.85rem; }
    .req-item { color: #94a3b8; margin-bottom: 5px; display: flex; align-items: center; transition: 0.3s; }
    .req-item::before { content: ""; display: inline-block; width: 8px; height: 8px; border-radius: 50%; border: 2px solid #cbd5e1; margin-right: 10px; transition: 0.3s; }
    
    
    .req-item.met { color: #10b981; font-weight: 600; }
    .req-item.met::before { background-color: #10b981; border-color: #10b981; }

    .btn-signup { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #6366f1; color: white; font-weight: 800; cursor: not-allowed; opacity: 0.5; transition: 0.3s; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form method="post" id="signupForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" id="userIn" 
                       class="{% if username_taken %}invalid-user{% endif %}"
                       value="{{ request.POST.username|default:'' }}" >
                
                <div id="user-taken-box" class="error-box {% if username_taken %}active{% endif %}">
                    <span>ID Tag already assigned to another operative.</span>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="passIn" name="password">
            </div>

            <ul class="req-list">
                <li id="len-req" class="req-item">At least 8 characters</li>
                <li id="num-req" class="req-item">At least one number</li>
                <li id="spec-req" class="req-item">At least one special character</li>
                <li id="match-req" class="req-item">Keys must match</li>
            </ul>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confIn">
            </div>

            <button type="submit" id="submitBtn" class="btn-signup" disabled>Initialize Account</button>
        </form>
    </div>
</div>

<script>
    const userIn = document.getElementById('userIn');
    const passIn = document.getElementById('passIn');
    const confIn = document.getElementById('confIn');
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('user-taken-box');

    const lenReq = document.getElementById('len-req');
    const numReq = document.getElementById('num-req');
    const specReq = document.getElementById('spec-req');
    const matchReq = document.getElementById('match-req');

    let usernameAvailable = true;

    async function checkUser() {
        const val = userIn.value.trim();
        if (val.length < 3) {
            errorBox.classList.remove('active');
            userIn.classList.remove('invalid-user');
            usernameAvailable = true;
            validate();
            return;
        }

        try {
            const response = await fetch(`/check-username/?username=${encodeURIComponent(val)}`);
            const data = await response.json();
            usernameAvailable = !data.is_taken;
            errorBox.classList.toggle('active', data.is_taken);
            userIn.classList.toggle('invalid-user', data.is_taken);
        } catch (e) { console.error("Connection failed."); }
        validate();
    }

    function validate() {
        const pVal = passIn.value;
        const cVal = confIn.value;

        const isLen = pVal.length >= 8;
        const hasNum = /\d/.test(pVal);
        const hasSpec = /[!@#$%^&*(),.?":{}|<>_-]/.test(pVal);
        const isMatch = (pVal === cVal) && cVal !== "" && pVal !== "";

        // Toggle 'met' class for the circles
        lenReq.classList.toggle('met', isLen);
        numReq.classList.toggle('met', hasNum);
        specReq.classList.toggle('met', hasSpec);
        matchReq.classList.toggle('met', isMatch);

        const isUserValid = userIn.value.length >= 3 && usernameAvailable;
        
        if (isLen && hasNum && hasSpec && isMatch && isUserValid) {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        } else {
            btn.disabled = true;
            btn.style.opacity = "0.5";
            btn.style.cursor = "not-allowed";
        }
    }

    userIn.addEventListener('input', checkUser);
    passIn.addEventListener('input', validate);
    confIn.addEventListener('input', validate);
</script>
{% endblock %}
